<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWallet — Programmazione</title>
    <link rel="icon" type="image/png" href="/images/logo-icona.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/it.js"></script>
    <script>
        if (!localStorage.getItem("access_token")) {
            document.documentElement.style.display = "none";
            window.location.href = "/login.html";
        }
    </script>
</head>
<body>

    <!-- SIDEBAR -->
    <nav id="sidebar">
        <div class="sidebar-logo">
            <img src="/images/logo-icona.png" alt="Icona MyWallet" style="width: 40px; height: auto;">
        </div>
        <div class="sidebar-nav">
            <a href="/" class="sidebar-link" data-tooltip="Home">
                <span class="sidebar-icon">⌂</span>
            </a>
            <a href="/programmazione.html" class="sidebar-link attivo" data-tooltip="Programmazione">
                <span class="sidebar-icon">◷</span>
            </a>
        </div>
        <div class="sidebar-bottom">
            <button id="btn-logout" class="sidebar-logout">
                <span class="sidebar-logout-label">Esci</span>
            </button>
        </div>
    </nav>

    <!-- CONTENUTO PRINCIPALE -->
    <div id="main-content">

        <header>
            <h1>
                <span class="logo-icon">📅</span>
                Programmazione
            </h1>
            <div class="header-utente">
                <span id="header-email"></span>
            </div>
        </header>

        <!-- ══════════════════════════════════════════
             CALENDARIO
             ══════════════════════════════════════════ -->
        <section id="sezione-calendario">

            <!-- Header: navigazione mese + legenda + pulsante aggiungi -->
            <div class="cal-header">
                <div class="cal-header-left">
                    <!-- Gruppo pill: ‹ Maggio 2026 › -->
                    <div class="cal-nav-group">
                        <button class="cal-nav-btn" id="cal-prev" title="Mese precedente">&#8249;</button>
                        <span class="cal-title" id="cal-title">—</span>
                        <button class="cal-nav-btn" id="cal-next" title="Mese successivo">&#8250;</button>
                    </div>

                    <!-- Legenda inline separata -->
                    <div class="cal-legenda">
                        <div class="cal-legenda-item">
                            <span class="cal-legenda-dot entrata"></span>
                            Entrata
                        </div>
                        <div class="cal-legenda-item">
                            <span class="cal-legenda-dot uscita"></span>
                            Uscita
                        </div>
                    </div>
                </div>
                <button class="cal-add-btn" id="btn-apri-modale-prog">
                    <span class="cal-add-icon">+</span>
                    Nuova transazione programmata
                </button>
            </div>

            <!-- Intestazione giorni settimana -->
            <div class="cal-weekdays">
                <div class="cal-weekday">Lun</div>
                <div class="cal-weekday">Mar</div>
                <div class="cal-weekday">Mer</div>
                <div class="cal-weekday">Gio</div>
                <div class="cal-weekday">Ven</div>
                <div class="cal-weekday">Sab</div>
                <div class="cal-weekday">Dom</div>
            </div>

            <!-- Griglia giorni (popolata via JS) -->
            <div class="cal-grid" id="cal-grid"></div>

        </section>

        <!-- ══════════════════════════════════════════
             LISTA RICORRENTI
             ══════════════════════════════════════════ -->
        <section id="sezione-ricorrenti">
            <h3>Transazioni programmate</h3>
            <div id="lista-ricorrenti" class="lista-programmate">
                <p class="lista-vuota">Nessuna transazione programmata</p>
            </div>
        </section>

    </div><!-- fine #main-content -->


    <!-- ══════════════════════════════════════════════
         MODALE — NUOVA TRANSAZIONE PROGRAMMATA
         ══════════════════════════════════════════════ -->
    <div id="modal-nuova-programmata" class="modal-overlay" style="display:none;">
        <div class="modal-card">

            <div class="modal-icon">🔁</div>
            <h2>Nuova transazione programmata</h2>
            <p>Configura una transazione ricorrente automatica.</p>

            <!-- Form a griglia 2 colonne -->
            <div class="modal-form-grid">

                <!-- Nome (full width) -->
                <div class="modal-input-group-labeled" style="grid-column: 1 / -1;">
                    <label for="prog-nome">Nome</label>
                    <input type="text" id="prog-nome" placeholder="Es. Spotify, Affitto, Stipendio…">
                </div>

                <!-- Importo -->
                <div class="modal-input-group-labeled">
                    <label for="prog-importo">Importo (€)</label>
                    <input type="number" id="prog-importo" placeholder="0,00" min="0" step="0.01">
                </div>

                <!-- Tipo -->
                <div class="modal-input-group-labeled">
                    <label for="prog-tipo">Tipo</label>
                    <select id="prog-tipo">
                        <option value="false" selected>Uscita</option>
                        <option value="true">Entrata</option>
                    </select>
                </div>

                <!-- Frequenza -->
                <div class="modal-input-group-labeled">
                    <label for="prog-frequenza">Frequenza</label>
                    <select id="prog-frequenza">
                        <option value="giornaliera">Giornaliera</option>
                        <option value="settimanale">Settimanale</option>
                        <option value="mensile" selected>Mensile</option>
                        <option value="annuale">Annuale</option>
                    </select>
                </div>

                <!-- Data di inizio -->
                <div class="modal-input-group-labeled">
                    <label for="prog-data">Data inizio</label>
                    <input type="text" id="prog-data" placeholder="gg/mm/aaaa">
                </div>

            </div><!-- fine modal-form-grid -->

            <!-- Pulsanti -->
            <div class="modal-prog-btn-group">
                <button class="modal-btn-ghost" id="btn-annulla-prog">Annulla</button>
                <button class="modal-btn" id="btn-salva-prog">Aggiungi</button>
            </div>

        </div>
    </div>


    <script src="/js/api.js"></script>
    <script src="/js/programmazione.js"></script>

</body>
</html>
