<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWallet — Accedi</title>
    <link rel="icon" type="image/png" href="/images/logo-icona.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── LAYOUT LOGIN ─────────────────────────────── */
        body {
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* ── LOGO ─────────────────────────────────────── */
        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .login-logo-icon {
            width: 52px;
            height: 52px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .login-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.01em;
        }

        .login-logo p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }

        /* ── CARD ─────────────────────────────────────── */
        .login-card {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px;
            position: relative;
            overflow: hidden;
        }

        .login-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% -20%, rgba(124, 111, 239, 0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── TAB TOGGLE ───────────────────────────────── */
        .login-tabs {
            display: flex;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 28px;
        }

        .login-tab {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-xs);
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-tab.attivo {
            background: var(--accent);
            color: #fff;
        }

        /* ── FORM ─────────────────────────────────────── */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .login-input-group label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .login-input-group input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            padding: 12px 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .login-input-group input::placeholder {
            color: var(--text-muted);
        }

        /* ── BOTTONE SUBMIT ───────────────────────────── */
        .login-btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 13px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 4px;
        }

        .login-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── MESSAGGIO ERRORE/SUCCESSO ────────────────── */
        .login-messaggio {
            font-size: 0.82rem;
            text-align: center;
            padding: 10px 14px;
            border-radius: var(--radius-xs);
            display: none;
        }

        .login-messaggio.errore {
            display: block;
            background: var(--negative-soft);
            color: var(--negative);
            border: 1px solid rgba(240, 104, 128, 0.25);
        }

        .login-messaggio.successo {
            display: block;
            background: var(--positive-soft);
            color: var(--positive);
            border: 1px solid rgba(62, 207, 142, 0.25);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">

        <!-- LOGO -->
        <div class="login-logo">
            <img src="/images/logo-completo.png" alt="MyWallet" class="img-logo-completo" style="height: 56px; margin-bottom: 8px;">
            <p>Gestisci le tue finanze in modo semplice</p>
        </div>

        <!-- CARD -->
        <div class="login-card">

            <!-- TAB TOGGLE -->
            <div class="login-tabs">
                <button class="login-tab attivo" id="tab-login" onclick="mostraTab('login')">Accedi</button>
                <button class="login-tab" id="tab-register" onclick="window.location.href='/registrazione.html'">Registrati</button>
            </div>

            <!-- FORM LOGIN -->
            <div id="form-login" class="login-form">
                <div class="login-input-group">
                    <label for="login-email" class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="la-tua@email.com">
                </div>
                <div class="login-input-group">
                    <label for="login-password" class="form-label">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••">
                </div>

                <div class="login-messaggio" id="msg-login"></div>
                <button class="btn-primary" id="btn-login" onclick="handleLogin()">Accedi</button>
            </div>

            <!-- FORM REGISTRAZIONE -->
            <div id="form-register" class="login-form" style="display:none;">
                <div class="login-input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="la-tua@email.com">
                </div>
                <div class="login-input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="min. 6 caratteri">
                </div>
                <div class="login-input-group">
                    <label for="reg-password2">Conferma password</label>
                    <input type="password" id="reg-password2" placeholder="••••••••">
                </div>
                <div class="login-messaggio" id="msg-register"></div>
                <button class="login-btn" id="btn-register" onclick="handleRegister()">Crea account</button>
            </div>

        </div>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/login.js"></script>

</body>
</html>
